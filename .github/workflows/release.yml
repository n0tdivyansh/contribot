name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Validate release
        run: npm run release:check

      - name: Pack npm tarball
        run: npm pack

      - name: Generate release notes
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v version="$VERSION" '
            BEGIN { capture = 0 }
            $0 == "## " version { capture = 1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md | sed '/^$/{
            N
            /^\n$/d
          }' > release-notes.md
          if [ ! -s release-notes.md ]; then
            printf 'Release %s\n' "$VERSION" > release-notes.md
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "AICA ${TAG} alpha" --notes-file release-notes.md
            gh release upload "$TAG" ./*.tgz --clobber
          else
            gh release create "$TAG" ./*.tgz --title "AICA ${TAG} alpha" --notes-file release-notes.md --prerelease
          fi

      - name: Publish to npm
        if: ${{ secrets.NPM_TOKEN != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
